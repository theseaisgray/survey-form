<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Starbucks Customer Feedback</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Playfair+Display:wght@700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:      #00704A;
      --green-dark: #1E3932;
      --green-lt:   #D4EDDA;
      --gold:       #CBA258;
      --bg:         #F1F8F4;
      --surface:    #FFFFFF;
      --ink:        #1E3932;
      --muted:      #5C7A6B;
      --border:     #C5DDD0;
      --danger:     #C0392B;
      --radius:     12px;
    }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      padding: 0 0 80px;
    }

    .hero {
      background: var(--green-dark);
      color: #fff;
      text-align: center;
      padding: 44px 24px 36px;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 60% 0%, #00704A55 0%, transparent 70%);
    }
    .hero .logo {
      font-size: 42px;
      margin-bottom: 8px;
      position: relative;
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(24px, 5vw, 38px);
      color: #fff;
      position: relative;
      margin-bottom: 8px;
    }
    .hero p {
      color: #A8C9B5;
      font-size: 15px;
      position: relative;
    }
    .hero .gold-bar {
      width: 48px;
      height: 3px;
      background: var(--gold);
      margin: 16px auto 0;
      border-radius: 2px;
      position: relative;
    }

    .form-wrap {
      max-width: 700px;
      margin: 36px auto 0;
      padding: 0 16px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 32px;
      box-shadow: 0 2px 8px #1E393210;
    }
    .section-title {
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--green-lt);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .field-group { display: flex; flex-direction: column; gap: 16px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label {
      font-size: 13px;
      font-weight: 700;
      color: var(--ink);
    }
    .field label .req { color: var(--danger); margin-left: 2px; }

    .field input[type="text"],
    .field input[type="email"],
    .field input[type="number"],
    .field select,
    .field textarea {
      width: 100%;
      padding: 10px 14px;
      font-family: 'Lato', sans-serif;
      font-size: 14px;
      color: var(--ink);
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px var(--green-lt);
    }
    .field input[type="number"] { max-width: 130px; }
    .field textarea { resize: vertical; min-height: 120px; }
    .field select { cursor: pointer; }

    .choice-group { display: flex; flex-direction: column; gap: 9px; margin-top: 6px; }
    .choice-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: background .12s, border-color .12s;
    }
    .choice-item:hover { background: var(--green-lt); border-color: var(--green); }
    .choice-item:has(input:checked) { background: var(--green-lt); border-color: var(--green); }
    .choice-item input[type="radio"],
    .choice-item input[type="checkbox"] {
      width: 16px; height: 16px;
      accent-color: var(--green);
      flex-shrink: 0; cursor: pointer;
    }
    .choice-item span { font-size: 14px; color: var(--ink); }

    .button-row {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }
    button {
      font-family: 'Lato', sans-serif;
      font-size: 14px;
      font-weight: 700;
      border: none;
      border-radius: 50px;
      padding: 12px 32px;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      letter-spacing: .03em;
    }
    button:active { transform: scale(.97); }
    button:disabled { opacity: .6; cursor: not-allowed; }

    .btn-reset {
      background: transparent;
      color: var(--muted);
      border: 1.5px solid var(--border);
    }
    .btn-reset:hover { background: var(--bg); color: var(--ink); }

    .btn-submit {
      background: var(--green);
      color: #fff;
    }
    .btn-submit:hover { opacity: .88; }

    #success-msg {
      display: none;
      max-width: 700px;
      margin: 24px auto 0;
      padding: 16px 24px;
      background: #D4EDDA;
      border: 1.5px solid var(--green);
      border-radius: var(--radius);
      font-size: 14px;
      color: var(--green-dark);
      font-weight: 700;
      text-align: center;
    }
  </style>
</head>

              <input type="radio" name="order_type" value="dine_in" required />
              <span>Dine-in (inside the café)</span>
            </label>
            <label class="choice-item">
              <input type="radio" name="order_type" value="takeout" />
              <span>Takeout / To-go</span>
            </label>
            <label class="choice-item">
              <input type="radio" name="order_type" value="drive_thru" />
              <span>Drive-Thru</span>
            </label>
            <label class="choice-item">
              <input type="radio" name="order_type" value="mobile_order" />
              <span>Mobile Order (Starbucks App)</span>
            </label>
            <label class="choice-item">
              <input type="radio" name="order_type" value="delivery" />
              <span>Delivery (GrabFood / Foodpanda)</span>
            </label>
          </div>
        </div>
      </div>

      <div class="section">
        <p class="section-title">🧾 What Did You Order?</p>
        <div class="field">
          <label>Select everything you ordered today: <span style="color:var(--muted); font-weight:400">(Choose all that apply)</span></label>
          <div class="choice-group">
            <label class="choice-item">
              <input type="checkbox" name="ordered_items" value="hot_drinks" />
              <span>Hot Drinks (Latte, Americano, Cappuccino, etc.)</span>
            </label>
            <label class="choice-item">
              <input type="checkbox" name="ordered_items" value="cold_drinks" />
              <span>Cold Drinks (Frappuccino, Iced Coffee, etc.)</span>
            </label>
            <label class="choice-item">
              <input type="checkbox" name="ordered_items" value="non_coffee" />
              <span>Non-Coffee Beverages (Tea, Refreshers, etc.)</span>
            </label>
            <label class="choice-item">
              <input type="checkbox" name="ordered_items" value="pastries" />
              <span>Pastries & Bakery Items</span>
            </label>
            <label class="choice-item">
              <input type="checkbox" name="ordered_items" value="sandwiches" />
              <span>Sandwiches & Meals</span>
            </label>
            <label class="choice-item">
              <input type="checkbox" name="ordered_items" value="merchandise" />
              <span>Merchandise (Tumblers, Mugs, etc.)</span>
            </label>
          </div>
        </div>
      </div>

      <div class="section">
        <p class="section-title">⭐ Overall Satisfaction</p>
        <div class="field">
          <label for="satisfaction">How would you rate your overall Starbucks experience today? <span class="req">*</span></label>
          <select id="satisfaction" name="satisfaction" required>
            <option value="" disabled selected>— Select a rating —</option>
            <option value="5">⭐⭐⭐⭐⭐ &nbsp; Excellent — Exceeded my expectations</option>
            <option value="4">⭐⭐⭐⭐&nbsp;&nbsp;&nbsp;&nbsp; Good — I'm satisfied</option>
            <option value="3">⭐⭐⭐&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Average — It was okay</option>
            <option value="2">⭐⭐&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Below Average — Needs improvement</option>
            <option value="1">⭐&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Poor — Very disappointed</option>
          </select>
        </div>
      </div>

      <div class="section">
        <p class="section-title">💬 Additional Feedback</p>
        <div class="field">
          <label for="comments">Comments, Suggestions, or Feedback</label>
          <textarea id="comments" name="comments"
            placeholder="Tell us about your drink, the service, the café atmosphere, or anything else you'd like us to know…"></textarea>
        </div>
      </div>

      <div class="button-row">
        <button type="submit" class="btn-submit">Submit Feedback →</button>
        <button type="reset" class="btn-reset">Reset Form</button>
      </div>

    </form>
  </div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbybemDG70lHLPlRfaOBLERk9Ud8fCa4cjIIV4vc2ckPYF48BpD1oeDdvrnLXl_JL_gR_g/exec';

    const form = document.getElementById('feedback-form');
    const successMsg = document.getElementById('success-msg');
    const submitBtn = form.querySelector('.btn-submit');

    form.addEventListener('submit', function (e) {
      e.preventDefault();

      if (!form.checkValidity()) {
        form.reportValidity();
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Submitting…';

      const data = new FormData(form);

      fetch(SCRIPT_URL, {
        method: 'POST',
        body: data,
        mode: 'no-cors'
      })
      .then(() => {
        successMsg.style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
        form.reset();
      })
      .catch(() => {
        alert('Something went wrong. Please try again.');
      })
      .finally(() => {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit Feedback →';
      });
    });

    form.addEventListener('input', () => {
      successMsg.style.display = 'none';
    });
  </script>

</body>
</html>
